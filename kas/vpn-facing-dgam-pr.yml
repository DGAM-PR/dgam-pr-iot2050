header:
  version: 14
  includes:
    - repo: meta-iot2050
      file: kas/iot2050.yml

build_system: isar
target: iot2050-image-swu-example

repos:
  meta-iot2050:
    url: https://github.com/siemens/meta-iot2050
    path: meta-iot2050
    branch: master
    layers:
      meta:
      meta-example: # REQUIRED for iot2050-image-swu-example
      # meta-node-red: NOT REQUIRED for PLC facing IOT2050 Device
      # meta-sm: NOT REQUIRED as only RS232 on X30 port (ASCII Communication) is needed

  meta-dgam-pr:
    path: meta-dgam-pr
    layers:
      .:

local_conf_header:
  root_password: |
    USERS += "root"
    USER_root[password] ??= "root"
    USER_root[flags] ??= "clear-text-password force-passwd-change"
  dgam_customization: |
    # Strip unwanted packages
    IMAGE_INSTALL:remove = "tcf-agent"
    IOT2050_DOCKER_SUPPORT = "0"
    # Extra debug/tooling packages
    IOT2050_DEBIAN_DEBUG_PACKAGES:remove = "mosquitto mosquitto-clients"
    # eno2 static IP: 192.168.1.3/24 (VPN-facing device)
    ENO2_PROFILE = "vpn"
    # Custom image packages
    IMAGE_INSTALL:append = " network-config kubesolo kubectl firewall-config-iot2050 serial-config"
    # Security hardening
    INITRAMFS_OVERLAY_MOUNT_OPTIONS = "defaults,nodev,nosuid"
  package-lock: |
    # 2026-03-23 17:13:35 UTC
    # 18:13:35 in your local Amsterdam time, UTC+1
    ISAR_APT_SNAPSHOT_TIMESTAMP = "1774284815"
    ISAR_USE_APT_SNAPSHOT = "1"

