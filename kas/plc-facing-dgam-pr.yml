header:
  version: 14
  includes:
    - repo: meta-iot2050
      file: kas/iot2050.yml

build_system: isar
target: iot2050-image-swu-example

repos:
  meta-iot2050:
    url: https://github.com/siemens/meta-iot2050
    path: meta-iot2050
    branch: stable/V01.06
    layers:
      meta:
      meta-example: # REQUIRED for iot2050-image-swu-example
      meta-node-red: # REQUIRED for PLC facing IOT2050 Device
      # meta-sm: NOT REQUIRED as only RS232 on X30 port (ASCII Communication) is needed

  # temp https://gitlab.com/cip-project/cip-core/isar-cip-core/-/commit/3cfd7f0c89155419551f6bf430033c5d1ddd80a7
  cip-core:
    url: https://gitlab.com/cip-project/cip-core/isar-cip-core.git
    commit: 3cfd7f0c89155419551f6bf430033c5d1ddd80a7

  meta-dgam-pr:
    path: meta-dgam-pr
    layers:
      .:

local_conf_header:
  root_password: |
    USERS += "root"
    USER_root[password] ??= "root"
    USER_root[flags] ??= "clear-text-password force-passwd-change"
  dgam_customization: |
    # Strip unwanted packages
    IMAGE_INSTALL:remove = "tcf-agent"
    IOT2050_DOCKER_SUPPORT = "0"
    # Extra debug/tooling packages
    IOT2050_DEBIAN_DEBUG_PACKAGES:append = " mosquitto mosquitto-clients"
    # Custom image packages
    IMAGE_INSTALL:append = " network-config mosquitto-config firewall-config-iot2050 node-red-config serial-config"
    # Node-RED feature
    IOT2050_NODE_RED_SUPPORT = "1"
    IOT2050_META_NODE_RED_PACKAGES = "mraa node-red node-red-gpio node-red-contrib-opcua node-red-contrib-modbus node-red-contrib-s7 node-red-node-serialport"